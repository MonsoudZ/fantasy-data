name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install OpenMP runtime (required by LightGBM)
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install dependencies
        # Include web + advice extras so the FastAPI layer and the (mock-driven)
        # advice tests are covered in CI (torch/the neural model stays out -- too
        # heavy for CI, and omitted from coverage). No ANTHROPIC_API_KEY is set,
        # so advice.available() is False in CI and no live call is ever made.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web,advice]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        # The data lake is not committed, so integration tests skip here; the
        # synthetic unit tests cover scoring, leak-free features, the walk-forward
        # protocol, the optimizer, betting math, and the web layer. Coverage is
        # gated (fail_under in pyproject) so it can't silently regress.
        run: pytest --cov=ffdata --cov-report=term-missing
