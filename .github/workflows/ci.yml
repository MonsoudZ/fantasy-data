name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install OpenMP runtime (required by LightGBM)
        run: sudo apt-get update && sudo apt-get install -y libgomp1

      - name: Install dependencies
        # Include the web extra so the FastAPI layer is covered in CI (torch/the
        # neural model stays out -- too heavy for CI, and omitted from coverage).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,web]"

      - name: Lint
        run: ruff check .

      - name: Run tests
        # The data lake is not committed, so integration tests skip here; the
        # synthetic unit tests cover scoring, leak-free features, the walk-forward
        # protocol, the optimizer, betting math, and the web layer. Coverage is
        # gated (fail_under in pyproject) so it can't silently regress.
        run: pytest --cov=ffdata --cov-report=term-missing
